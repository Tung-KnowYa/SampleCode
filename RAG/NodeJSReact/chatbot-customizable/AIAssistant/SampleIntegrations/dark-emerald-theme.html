<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sample host page: ai-chatbot-widget with dark-emerald theme (embeddable assistant).">
  <title>Sample — Dark emerald theme widget</title>
  <style>
    :root {
      --host-bg: #0a0a0a;
      --host-text: #fafafa;
      --host-emerald: #10b981;
      --host-card: #141414;
      --host-border: #1e293b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: var(--host-bg);
      color: var(--host-text);
      line-height: 1.5;
    }
    .skip-link {
      position: absolute;
      left: -9999px;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: var(--host-emerald);
      color: #0a0a0a;
      font-weight: 600;
      text-decoration: none;
      border-radius: 0 0 0.25rem 0;
    }
    .skip-link:focus { left: 0; top: 0; }
    header {
      padding: 1rem 1.25rem;
      background: var(--host-card);
      border-bottom: 3px solid var(--host-emerald);
    }
    header h1 { margin: 0; font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { margin: 0.35rem 0 0; font-size: 0.8125rem; color: #d4d4d8; }
    main {
      padding: 1.5rem 1.25rem 4rem;
      max-width: 42rem;
    }
    .card {
      background: var(--host-card);
      border: 1px solid var(--host-border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
    }
    footer.note {
      padding: 1rem 1.25rem;
      font-size: 0.75rem;
      color: #a3a3a3;
      border-top: 1px solid var(--host-border);
      background: var(--host-card);
    }
    footer.note code { font-size: 0.7rem; background: #1e293b; padding: 0.15rem 0.35rem; border-radius: 0.2rem; color: var(--host-emerald); }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header>
    <h1>Executive overview</h1>
    <p>Premium dark host chrome; widget <strong>theme=&quot;dark-emerald&quot;</strong>.</p>
  </header>
  <main id="main">
    <div class="card">
      <p style="margin: 0">Placeholder content. Launcher opens the assistant.</p>
    </div>
  </main>
  <footer class="note">
    Bundle: <code>../frontend/dist/chatbot-widget.bundle.js</code>
  </footer>

  <script src="../frontend/dist/chatbot-widget.bundle.js"></script>
  <ai-chatbot-widget theme="dark-emerald" api-base="http://localhost:3002"></ai-chatbot-widget>
</body>
</html>
